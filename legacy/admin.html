<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResinRush Admin</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { padding: 2rem; background: var(--bg-primary); color: var(--text-primary); }
    .admin-header { max-width: 1100px; margin: auto 0 2rem; display: flex; justify-content: space-between; align-items: center; }
    .admin-header h1 { margin: 0; font-size: 2rem; }
    .admin-panel { max-width: 1100px; margin: 0 auto; }
    .admin-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2rem; margin-bottom: 2rem; box-shadow: var(--shadow-card); }
    .admin-form .form-group { margin-bottom: 1rem; }
    .admin-form label { display: block; margin-bottom: 0.5rem; color: var(--text-secondary); }
    .admin-form input, .admin-form select, .admin-form textarea { width: 100%; padding: 0.9rem 1rem; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-card); color: var(--text-primary); }
    .admin-form select { color: var(--text-primary) !important; background: var(--bg-card) !important; -webkit-appearance: none; appearance: none; }
    .admin-form select option { color: var(--text-primary) !important; background: var(--bg-card) !important; }
    .admin-form select option[disabled] { color: var(--text-muted) !important; }
    .admin-form textarea { min-height: 120px; resize: vertical; }
    .image-preview-grid { display: grid; gap: 0.75rem; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); }
    .image-preview-item { position: relative; border: 1px solid rgba(0,0,0,0.08); border-radius: var(--radius-sm); background: var(--bg-secondary); overflow: hidden; }
    .image-preview-item img { width: 100%; height: 100px; object-fit: cover; display: block; }
    .image-preview-meta { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 0.75rem; font-size: 0.85rem; color: var(--text-primary); }
    .image-preview-actions { display: flex; gap: 0.4rem; }
    .image-preview-actions button { border: 1px solid var(--border); border-radius: 999px; padding: 0.3rem 0.55rem; background: transparent; color: var(--text-primary); font-size: 0.8rem; }
    .image-preview-actions button:hover { background: rgba(201,168,76,0.12); }
    /* Extra fallback for browsers that don't style options reliably */
    .admin-form select:-moz-focusring { color: var(--text-primary); }
    .admin-form select::-ms-expand { display: none; }
    .admin-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    .admin-table th, .admin-table td { padding: 0.95rem 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .admin-table th { text-align: left; color: var(--text-secondary); font-size: 0.95rem; }
    .admin-table td { color: var(--text-primary); }
    .admin-table img { width: 80px; height: auto; border-radius: 12px; object-fit: cover; }
    .admin-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .admin-actions .btn { min-width: 150px; }
    .admin-note { color: var(--text-muted); margin-top: 0.75rem; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="admin-panel">
    <div class="admin-header">
      <div>
        <h1>ResinRush Admin</h1>
        <p class="admin-note">Add, edit, or delete product entries used by the gallery.</p>
      </div>
      <a href="index.html" class="btn btn-primary">View Store</a>
    </div>

    <section class="admin-card">
      <h2>Add / Edit Product</h2>
      <form id="product-form" class="admin-form" novalidate>
        <div class="form-group">
          <label for="product-name">Product Name *</label>
          <input type="text" id="product-name" name="name" required />
        </div>
        <div class="form-group">
          <label for="product-category">Category *</label>
          <select id="product-category" name="category" required>
            <option value="" disabled selected>Select category</option>
            <option value="clocks">Clocks</option>
            <option value="coasters">Coasters</option>
            <option value="trays">Trays</option>
            <option value="wall-art">Frames</option>
            <option value="keychains">Keychains</option>
            <option value="custom">Custom Pieces</option>
          </select>
        </div>
        <div class="form-group">
          <label for="product-images">Product Images * (you can add multiple)</label>
          <input type="file" id="product-images" name="images" accept="image/*" multiple />
        </div>
        <div class="form-group" id="image-preview-panel" style="display:none;">
          <label>Selected Images</label>
          <div id="image-preview-info" style="font-size:0.95rem; margin-bottom:0.75rem; color: var(--text-secondary);"></div>
          <div id="image-preview-container" class="image-preview-grid"></div>
        </div>
        <div class="form-group">
          <label for="product-desc">Description</label>
          <textarea id="product-desc" name="desc"></textarea>
        </div>
        <div class="form-group">
          <label for="product-details">Details (one per line, format: Key: Value)</label>
          <textarea id="product-details" name="details" placeholder="Size: 30cm x 30cm\nFinish: High gloss"></textarea>
        </div>
        <div class="admin-actions">
          <button type="submit" class="btn btn-primary" id="save-product-btn">Save Product</button>
          <button type="button" class="btn btn-outline" id="cancel-edit-btn">Cancel Edit</button>
        </div>
      </form>
      <div id="product-message" class="admin-note"></div>
    </section>

    <section class="admin-card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
        <h2>Existing Products</h2>
        <button class="btn btn-primary" id="refresh-products-btn">Refresh</button>
      </div>
      <table class="admin-table" id="products-table">
        <thead>
          <tr>
            <th>Image</th>
            <th>Name</th>
            <th>Category</th>
            <th>Description</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </div>

  <script src="js/admin.js" defer></script>
</body>
</html>
